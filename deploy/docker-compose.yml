# Production stack for a VPS (e.g. the box already running n8n). Fronted by a
# Cloudflare Tunnel, so NO ports are opened on the host and TLS is handled by Cloudflare.
#
#   cp .env.example .env   # then fill it in
#   docker compose up -d --build
#
# First run only, pull the embedding model:
#   docker compose exec ollama ollama pull nomic-embed-text
#
# See REMOTE.md for the full Cloudflare + box walkthrough.

services:
  grimoire:                       # dashboard + REST API  ->  grimoire.aquryu.space
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      GRIMOIRE_DB_PATH: /app/data/grimoire.db
      GRIMOIRE_PROVIDER: ollama
      GRIMOIRE_OLLAMA_URL: http://ollama:11434
      GRIMOIRE_EMBED_MODEL: nomic-embed-text
      GRIMOIRE_LLM_MODEL: llama3.2
      GRIMOIRE_GROQ_API_KEY: ${GRIMOIRE_GROQ_API_KEY:-}
      GRIMOIRE_PUBLIC_ORIGINS: ${GRIMOIRE_PUBLIC_ORIGINS:-}
    volumes:
      - grimoire_data:/app/data
      - grimoire_backups:/app/backups
    depends_on: [ollama]
    restart: unless-stopped

  mcp:                            # MCP gateway over HTTP  ->  mcp.aquryu.space/mcp
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "grimoire.gateway"]
    environment:
      GRIMOIRE_DB_PATH: /app/data/grimoire.db
      GRIMOIRE_PROVIDER: ollama
      GRIMOIRE_OLLAMA_URL: http://ollama:11434
      GRIMOIRE_EMBED_MODEL: nomic-embed-text
      GRIMOIRE_LLM_MODEL: llama3.2
      GRIMOIRE_GROQ_API_KEY: ${GRIMOIRE_GROQ_API_KEY:-}
      GRIMOIRE_MCP_TRANSPORT: http
      GRIMOIRE_MCP_HTTP_PORT: "8730"
      GRIMOIRE_MCP_TOKEN: ${GRIMOIRE_MCP_TOKEN:?set GRIMOIRE_MCP_TOKEN in .env}
    volumes:
      - grimoire_data:/app/data       # same store the dashboard uses (shared SQLite/WAL)
      - grimoire_backups:/app/backups
    depends_on: [ollama]
    restart: unless-stopped

  ollama:                         # CPU embeddings (nomic-embed-text); completions prefer Groq
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  cloudflared:                    # the tunnel: routes the two subdomains to the services above
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on: [grimoire, mcp]
    restart: unless-stopped

volumes:
  grimoire_data:
  grimoire_backups:
  ollama_data:
